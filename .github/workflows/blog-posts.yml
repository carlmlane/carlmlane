name: Blog Posts

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://carlmlane.com/feed.xml"
          max_post_count: 3
          readme_path: "./README.md"
          comment_tag_name: "BLOG-POST-LIST"
